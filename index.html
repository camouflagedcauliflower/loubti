function start(){order=shuffle(DATA.questions);index=0;initTotals();answers=[];showQuestion()}
function showQuestion(){const q=order[index],pct=Math.round(index/order.length*100),back=index>0?`<button class="back" onclick="goBack()">← 返回上一题</button>`:"";render(`<div class="progress-wrap"><div class="progress-meta"><span>第 ${index+1} / ${order.length} 题</span><span>${pct}%</span></div><div class="progress"><span style="width:${pct}%"></span></div></div><div class="question">${esc(q.text)}</div><div class="options">${LETTERS.map(l=>`<button class="option" onclick="choose('${q.id}','${l}')"><span class="letter">${l}</span><span>${esc(q.options[l])}</span></button>`).join("")}${back}</div>`)}
function choose(qid,letter){const q=DATA.questions.find(x=>x.id===qid);totals[q.dimension]+=Number(q.scores[letter]||0);answers.push({id:qid,choice:letter});index++;index>=order.length?showResult():setTimeout(showQuestion,140)}
function goBack(){if(index<=0||!answers.length)return;const last=answers.pop(),q=DATA.questions.find(x=>x.id===last.id);if(q){totals[q.dimension]-=Number(q.scores[last.choice]||0);if(totals[q.dimension]<0)totals[q.dimension]=0}index--;showQuestion()}
function distance(a,b){return Math.sqrt(DATA.dimensions.reduce((sum,d)=>sum+Math.pow((a[d]||0)-(b[d]||0),2),0))}
function matchPerson(){let best=null;for(const p of DATA.persons){const raw=distance(totals,p.scores),calibrated=raw+(DATA.balanceBias[p.name]||0);if(!best||calibrated<best.calibrated)best={person:p,raw,calibrated}}return best}
function stableHash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function seededRandom(seed){let t=seed>>>0;return function(){t+=0x6D2B79F5;let r=Math.imul(t^t>>>15,1|t);r^=r+Math.imul(r^r>>>7,61|r);return((r^r>>>14)>>>0)/4294967296}}
function answerSignature(){return DATA.questions.map(q=>{const a=answers.find(x=>x.id===q.id);return `${q.id}:${a?.choice||""}`}).join("|")}
function complementPerson(){
  const signature=answerSignature();
  const rand=seededRandom(stableHash(signature));
  const pool=DATA.persons.map(p=>{
    const raw=distance(totals,p.scores);
    const calibrated=Math.max(1,raw+(DATA.complementBias?.[p.name]||0));
    return{person:p,raw,calibrated}
  }).sort((a,b)=>b.calibrated-a.calibrated||a.person.name.localeCompare(b.person.name,"zh-Hans-CN"));
  const candidateCount=Math.min(12,Math.max(5,Math.ceil(pool.length*0.32)));
  const candidates=pool.slice(0,candidateCount);
  const temperature=18;
  let total=0;
  for(let i=0;i<candidates.length;i++){
    const rankPenalty=1/(1+i*0.18);
    candidates[i].weight=Math.exp((candidates[i].calibrated-candidates[0].calibrated)/temperature)*rankPenalty;
    total+=candidates[i].weight;
  }
  let r=rand()*total;
  for(const item of candidates){r-=item.weight;if(r<=0)return item}
  return candidates[candidates.length-1]
}

function showResult(){const m=matchPerson(),c=complementPerson(),rows=DATA.dimensions.map(d=>`<div class="score-row"><span>${esc(d)}</span><div class="bar"><span style="width:${Math.max(0,Math.min(100,totals[d]))}%"></span></div><strong>${totals[d]}</strong></div>`).join("");render(`<span class="badge">🎉 你的楼内人格是</span><div class="result-grid"><section><div class="person-name">${esc(m.person.name)}</div><div class="subcard"><strong>与你最互补的楼内人格：${esc(displayComplementName(m.person.name,c.person.name))}</strong><p class="small">互补人格按四维分数与你距离最远来计算，代表和你画像差异最大的一型。</p></div><div class="score-list">${rows}</div><div class="start-actions"><button onclick="showHome()">返回首页</button><button class="secondary" onclick="start()">重新测试</button></div></section><section><div class="radar-card"><h2 class="radar-title">四维人格图</h2><div class="radar-divider"></div><p class="radar-subtitle">从四个维度全面看见你的性格特质</p><canvas id="radar" width="920" height="920" aria-label="四维人格图"></canvas><div class="chart-note"><strong style="color:#ff8a3d">橙色</strong>区域代表你的得分，<strong style="color:#4b4b4b">深灰色</strong>线条代表匹配人格的典型得分表现。</div></div></section></div>`);requestAnimationFrame(()=>drawRadarAnimated(totals,m.person.scores))}
function drawRadarAnimated(userScores,matchScores){
  let start=null;
  function step(t){
    if(!start)start=t;
    const p=Math.min(1,(t-start)/850);
    const eased=1-Math.pow(1-p,3);
    drawRadar(userScores,matchScores,eased);
    if(p<1)requestAnimationFrame(step)
  }
  requestAnimationFrame(step)
}
function drawRadar(userScores,matchScores,progress=1){const canvas=document.getElementById("radar"),ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,R=W*.34,dims=DATA.dimensions;ctx.clearRect(0,0,W,H);ctx.font='bold 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';ctx.textAlign="center";ctx.textBaseline="middle";function point(i,val){const ang=-Math.PI/2+i*Math.PI*2/dims.length,r=R*val/100*progress;return[cx+Math.cos(ang)*r,cy+Math.sin(ang)*r]}function axisPoint(i,val){const ang=-Math.PI/2+i*Math.PI*2/dims.length,r=R*val/100;return[cx+Math.cos(ang)*r,cy+Math.sin(ang)*r]}ctx.strokeStyle="#efc29b";ctx.lineWidth=3;for(let ring=1;ring<=4;ring++){ctx.beginPath();for(let i=0;i<dims.length;i++){const [x,y]=axisPoint(i,ring*25);i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.closePath();ctx.stroke()}for(let i=0;i<dims.length;i++){const [x,y]=axisPoint(i,100);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.stroke();const [lx,ly]=axisPoint(i,116);ctx.fillStyle="#7a5a3f";ctx.fillText(dims[i],lx,ly)}function polygon(scores,fill,stroke){ctx.beginPath();for(let i=0;i<dims.length;i++){const [x,y]=point(i,scores[dims[i]]);i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=6;ctx.stroke()}polygon(matchScores,"rgba(75,75,75,.14)","rgba(75,75,75,.82)");polygon(userScores,"rgba(255,106,0,.26)","rgba(255,106,0,.94)");ctx.font='22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';ctx.textBaseline="middle";ctx.fillStyle="#ff6a00";ctx.fillText("● 你的得分",cx-115,H-34);ctx.fillStyle="#4b4b4b";ctx.fillText("● 匹配人格得分",cx+145,H-34)}
showHome();
